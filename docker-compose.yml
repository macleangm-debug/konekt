version: '3.8'

services:
  # MongoDB Database (internal only)
  mongodb:
    image: mongo:7.0
    container_name: konekt-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: konekt_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - konekt-internal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/konekt_db --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # FastAPI Backend (internal only)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: konekt-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=konekt_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - konekt-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # React Frontend (internal only)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://konekt.co.tz
    container_name: konekt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - konekt-internal

  # Nginx Reverse Proxy (public-facing)
  nginx:
    image: nginx:alpine
    container_name: konekt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - konekt-internal

volumes:
  mongodb_data:
    driver: local

networks:
  konekt-internal:
    driver: bridge
